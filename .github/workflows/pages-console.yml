name: AionUi Pages Console

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages-console.yml'
  pull_request:
    paths:
      - 'docs/**'
      - '.github/workflows/pages-console.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-console-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Validate console files
        run: |
          test -f docs/console/index.html
          test -f docs/console/styles.css
          test -f docs/console/app.js
          python -m json.tool docs/console/portfolio.json >/dev/null
          grep -q 'Static Pages mode' docs/console/index.html
          grep -q 'api.github.com/repos' docs/console/app.js

  build-pages:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/configure-pages@v5
      - uses: actions/jekyll-build-pages@v1
        with:
          source: ./docs
          destination: ./_site
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
